<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindClash</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D1117;--card:#161B22;--border:#21262D;--text:#F0F6FC;--subtext:#8B949E;}
.light{--bg:#F5F7FF;--card:#FFFFFF;--border:#E0E7FF;--text:#111827;--subtext:#6B7280;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;transition:background 0.3s,color 0.3s;}
.app{width:100%;max-width:480px;padding:16px;margin:auto;}
.btn{background:linear-gradient(135deg,#6366F1,#4F46E5);color:#fff;border:none;border-radius:14px;padding:14px 24px;font-size:17px;font-weight:700;cursor:pointer;width:100%;font-family:'Tajawal',sans-serif;transition:opacity 0.2s;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.4;cursor:default;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:12px;transition:background 0.3s,border-color 0.3s;}
input{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:16px;font-family:'Tajawal',sans-serif;outline:none;width:100%;transition:all 0.3s;}
.screen{display:none;}
.screen.active{display:block;}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.topic-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:16px 8px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
.option-btn{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 18px;color:var(--text);font-size:16px;font-weight:600;text-align:right;cursor:pointer;width:100%;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:all 0.2s;}
.option-btn:disabled{cursor:default;}
.option-btn.correct{background:#10B98122;border-color:#10B981;color:#10B981;}
.option-btn.wrong{background:#EF444422;border-color:#EF4444;color:#EF4444;}
.option-btn.eliminated{opacity:0.2;}
.badge{background:#6366F1;color:#fff;border-radius:20px;padding:2px 12px;font-size:13px;font-weight:700;}
.powerup-btn{width:52px;height:52px;border-radius:14px;border:1.5px solid;font-size:22px;cursor:pointer;transition:all 0.2s;background:transparent;}
.powerup-btn:disabled{opacity:0.25;cursor:default;}
.progress-bar{height:4px;background:var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366F1,#C084FC);transition:width 0.3s;}
.timer-box{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:20px;padding:6px 14px;background:var(--card);transition:all 0.3s;}
.timer-box.danger{border-color:#EF4444!important;background:#EF444422!important;}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-radius:18px;margin-bottom:10px;border:2px solid var(--border);background:var(--card);}
.result-row.first{border-color:#FFC107;background:#FFC10711;}
.score-badge{background:#6366F1;color:#fff;border-radius:20px;padding:4px 16px;font-weight:900;font-size:18px;}
.score-badge.gold{background:#FFC107;color:#000;}
.count-btn{padding:10px 0;width:60px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;font-family:'Tajawal',sans-serif;cursor:pointer;font-weight:700;}
.count-btn.active{background:linear-gradient(135deg,#6366F1,#4F46E5);border-color:#6366F1;color:#fff;}
.double-banner{background:#FFC10722;border:1px solid #FFC107;border-radius:12px;padding:6px 14px;margin-bottom:10px;text-align:center;color:#FFC107;font-weight:700;}
.theme-toggle{background:var(--card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.solo-hint{background:#6366F122;border:1px solid #6366F1;border-radius:12px;padding:8px 14px;text-align:center;color:#818CF8;font-size:13px;margin-bottom:12px;}
.avatar-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;cursor:pointer;border:2px solid transparent;transition:all 0.2s;color:#fff;}
.avatar-circle.selected{border-color:#fff;transform:scale(1.15);box-shadow:0 0 12px rgba(99,102,241,0.6);}
.diff-badge{border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;}
.diff-easy{background:#10B98122;color:#10B981;border:1px solid #10B981;}
.diff-medium{background:#FFC10722;color:#FFC107;border:1px solid #FFC107;}
.diff-hard{background:#EF444422;color:#EF4444;border:1px solid #EF4444;}
.stat-bar-bg{background:var(--border);border-radius:10px;height:8px;overflow:hidden;margin-top:4px;}
.stat-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#6366F1,#C084FC);transition:width 0.8s;}
.leaderboard-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:12px;margin-bottom:6px;background:var(--card);border:1px solid var(--border);}
.tab-btn{flex:1;padding:10px;border:none;background:none;color:var(--subtext);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab-btn.active{color:#6366F1;border-bottom-color:#6366F1;}
.pulse{animation:pulse 0.3s ease;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
</style>
</head>
<body>
<div class="app">

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0 0">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <button onclick="goTo('leaderboard')" style="background:none;border:none;color:var(--subtext);cursor:pointer;font-size:13px;font-weight:700">🏆 المتصدرين</button>
  </div>
  <div style="text-align:center;padding:24px 0 32px">
    <div style="width:90px;height:90px;border-radius:24px;background:linear-gradient(135deg,#6366F1,#4F46E5);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 16px;box-shadow:0 0 40px #6366F188">⚡</div>
    <h1 style="font-size:36px;font-weight:900;background:linear-gradient(135deg,#818CF8,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MindClash</h1>
    <p style="color:var(--subtext);margin:8px 0 32px;font-size:16px">تحدى أصدقاءك بأسئلة ذكية</p>
    <button class="btn" onclick="goTo('players')">▶ ابدأ اللعبة</button>
    <div style="display:flex;justify-content:center;gap:24px;margin-top:28px">
      <div style="text-align:center"><div style="font-size:24px;margin-bottom:4px">👥</div><div style="font-size:11px;color:var(--subtext)">1-8 لاعبين</div></div>
      <div style="text-align:center"><div style="font-size:24px;margin-bottom:4px">🎯</div><div style="font-size:11px;color:var(--subtext)">8 تصنيفات</div></div>
      <div style="text-align:center"><div style="font-size:24px;margin-bottom:4px">📈</div><div style="font-size:11px;color:var(--subtext)">صعوبة متدرجة</div></div>
      <div style="text-align:center"><div style="font-size:24px;margin-bottom:4px">🔊</div><div style="font-size:11px;color:var(--subtext)">مؤثرات صوتية</div></div>
    </div>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="screen-leaderboard" class="screen">
  <div class="row">
    <button onclick="goTo('home')" style="background:none;border:none;color:var(--subtext);cursor:pointer;font-size:20px">→</button>
    <h2 style="font-size:22px;font-weight:800">🏆 المتصدرين</h2>
    <button onclick="clearLeaderboard()" style="background:none;border:none;color:#EF4444;cursor:pointer;font-size:12px">مسح</button>
  </div>
  <div id="leaderboard-list"></div>
</div>

<!-- PLAYERS -->
<div id="screen-players" class="screen">
  <div class="row">
    <button onclick="goTo('home')" style="background:none;border:none;color:var(--subtext);cursor:pointer;font-size:20px">→</button>
    <h2 style="font-size:22px;font-weight:800">أضف اللاعبين</h2>
    <span id="player-count" style="color:var(--subtext);font-size:13px">0/8</span>
  </div>
  <div class="solo-hint">💡 يمكنك اللعب بمفردك! أضف اسمك فقط</div>
  <p style="color:var(--subtext);font-size:13px;margin-bottom:8px">اختر لون</p>
  <div id="avatar-picker" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"></div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <input id="player-input" type="text" placeholder="اسم اللاعب..." onkeydown="if(event.key==='Enter')addPlayer()">
    <button onclick="addPlayer()" style="background:linear-gradient(135deg,#6366F1,#4F46E5);border:none;border-radius:12px;width:48px;height:48px;font-size:24px;color:#fff;cursor:pointer;flex-shrink:0">+</button>
  </div>
  <div id="players-list" style="margin-bottom:16px"></div>
  <button class="btn" id="btn-to-topics" onclick="goTo('topics')" disabled>التالي →</button>
  <p id="players-hint" style="text-align:center;color:var(--subtext);font-size:14px;margin-top:8px">أضف لاعباً واحداً على الأقل</p>
</div>

<!-- TOPICS -->
<div id="screen-topics" class="screen">
  <div class="row">
    <button onclick="goTo('players')" style="background:none;border:none;color:var(--subtext);cursor:pointer;font-size:20px">→</button>
    <h2 style="font-size:22px;font-weight:800">اختر المواضيع</h2>
    <span id="topics-count" class="badge">0 مختار</span>
  </div>
  <div class="grid2" id="topics-grid"></div>
  <div style="display:flex;border-bottom:1px solid var(--border);margin:12px 0">
    <button class="tab-btn active" id="tab-normal" onclick="setMode('normal')">عادي ⏱ 15ث</button>
    <button class="tab-btn" id="tab-speed" onclick="setMode('speed')">سرعة ⚡ 5ث</button>
  </div>
  <p style="color:var(--subtext);font-size:13px;text-align:center;margin-bottom:8px">عدد الأسئلة لكل لاعب</p>
  <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">
    <button class="count-btn active" onclick="setCount(3)">3</button>
    <button class="count-btn" onclick="setCount(5)">5</button>
    <button class="count-btn" onclick="setCount(7)">7</button>
    <button class="count-btn" onclick="setCount(10)">10</button>
  </div>
  <button class="btn" id="btn-start" onclick="startGame()" disabled>▶ ابدأ اللعبة</button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="row" style="margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px">
      <div id="player-avatar-display" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff"></div>
      <span style="font-size:18px">⭐</span>
      <span id="current-score" style="font-weight:800;font-size:16px">0</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span id="diff-badge" class="diff-badge diff-easy">سهل</span>
      <span id="topic-badge" style="background:#6366F122;color:#818CF8;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700"></span>
    </div>
    <span id="q-counter" style="color:var(--subtext);font-size:14px;font-weight:700"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="row">
    <div class="timer-box" id="timer-box"><span>⏱</span><span id="timer-num" style="font-weight:800;font-size:16px">15</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="color:var(--subtext);font-size:14px">دور</span>
      <span id="current-player-badge" style="color:#fff;border-radius:20px;padding:4px 14px;font-weight:800;font-size:15px"></span>
    </div>
  </div>
  <div id="double-banner" class="double-banner" style="display:none">⚡ نقاط مضاعفة!</div>
  <div class="card" style="text-align:center;padding:20px 16px">
    <p id="question-text" style="margin:0;font-size:18px;font-weight:800;line-height:1.6"></p>
  </div>
  <div id="options-container"></div>
  <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px" id="powerups-container"></div>
  <button class="btn" id="btn-next" onclick="nextQuestion()" style="display:none">السؤال التالي →</button>
</div>

<!-- RESULTS -->
<div id="screen-results" class="screen">
  <div style="text-align:center;margin-bottom:20px">
    <div style="font-size:64px;margin-bottom:8px">🏆</div>
    <h2 style="font-size:28px;font-weight:900;background:linear-gradient(135deg,#FFC107,#FF9800);-webkit-background-clip:text;-webkit-text-fill-color:transparent">النتائج النهائية</h2>
  </div>
  <div id="results-list"></div>
  <div id="stats-section" style="margin-top:16px"></div>
  <button class="btn" style="margin-top:16px" onclick="resetGame()">🔄 لعبة جديدة</button>
</div>

</div>
<script>
const TOPICS=[
  {id:"geography",label:"جغرافيا",emoji:"🌍",color:"#00BCD4"},
  {id:"history",label:"تاريخ",emoji:"🏛️",color:"#9C27B0"},
  {id:"football",label:"كرة القدم",emoji:"⚽",color:"#2196F3"},
  {id:"tech",label:"تقنية",emoji:"💻",color:"#4CAF50"},
  {id:"games",label:"ألعاب",emoji:"🎮",color:"#E91E63"},
  {id:"cars",label:"سيارات",emoji:"🚗",color:"#FF9800"},
  {id:"culture",label:"ثقافة عامة",emoji:"💡",color:"#FFC107"},
  {id:"funny",label:"تحديات مضحكة",emoji:"😂",color:"#F44336"},
];
const AVATAR_COLORS=[
  {bg:"#6366F1"},{bg:"#EC4899"},{bg:"#F59E0B"},{bg:"#10B981"},
  {bg:"#3B82F6"},{bg:"#8B5CF6"},{bg:"#EF4444"},{bg:"#06B6D4"},
  {bg:"#84CC16"},{bg:"#F97316"},{bg:"#14B8A6"},{bg:"#A855F7"},
];
const POWERUPS_DEF=[
  {id:"eliminate",icon:"✂️",label:"حذف إجابتين",color:"#E91E63"},
  {id:"double",icon:"⚡",label:"مضاعفة النقاط",color:"#FFC107"},
  {id:"skip",icon:"⏭️",label:"تجاوز السؤال",color:"#2196F3"},
  {id:"time",icon:"⏰",label:"زيادة الوقت",color:"#4CAF50"},
];
const QB={
  geography:[
    {q:"عاصمة فرنسا؟",o:["برلين","باريس","روما","مدريد"],a:1,d:"easy"},
    {q:"عاصمة اليابان؟",o:["بكين","طوكيو","سيول","بانكوك"],a:1,d:"easy"},
    {q:"أكبر قارة في العالم؟",o:["أفريقيا","أمريكا","آسيا","أوروبا"],a:2,d:"easy"},
    {q:"أطول نهر في العالم؟",o:["الأمازون","النيل","المسيسيبي","الفولغا"],a:1,d:"easy"},
    {q:"عاصمة أستراليا؟",o:["سيدني","ملبورن","كانبيرا","بريسبان"],a:2,d:"easy"},
    {q:"عاصمة البرازيل؟",o:["ريو","ساو باولو","برازيليا","سلفادور"],a:2,d:"easy"},
    {q:"أكبر دولة مساحة؟",o:["كندا","الصين","أمريكا","روسيا"],a:3,d:"easy"},
    {q:"عاصمة كندا؟",o:["تورنتو","فانكوفر","مونتريال","أوتاوا"],a:3,d:"easy"},
    {q:"عاصمة إيطاليا؟",o:["ميلان","فينيسيا","روما","نابولي"],a:2,d:"easy"},
    {q:"عاصمة إسبانيا؟",o:["برشلونة","مدريد","إشبيلية","فالنسيا"],a:1,d:"easy"},
    {q:"عاصمة ألمانيا؟",o:["ميونخ","هامبورغ","برلين","فرانكفورت"],a:2,d:"easy"},
    {q:"عاصمة المكسيك؟",o:["غوادالاخارا","مونتيري","مكسيكو سيتي","كانكون"],a:2,d:"easy"},
    {q:"أعمق بحيرة في العالم؟",o:["فيكتوريا","بايكال","سوبيريور","تيتيكاكا"],a:1,d:"medium"},
    {q:"أعلى جبل في العالم؟",o:["K2","إيفرست","كيليمنجارو","مون بلان"],a:1,d:"medium"},
    {q:"أكبر صحراء في العالم؟",o:["الصحراء الكبرى","جوبي","أنتاركتيكا","ربع الخالي"],a:2,d:"medium"},
    {q:"أطول سلسلة جبال؟",o:["الهيمالايا","الأنديز","الألب","الروكي"],a:1,d:"medium"},
    {q:"كم عدد دول أفريقيا؟",o:["45","54","62","70"],a:1,d:"medium"},
    {q:"أكبر جزيرة في العالم؟",o:["أستراليا","بورنيو","غرينلاند","مدغشقر"],a:2,d:"medium"},
    {q:"أين يقع نهر الأمازون؟",o:["أفريقيا","آسيا","أمريكا الجنوبية","أمريكا الشمالية"],a:2,d:"medium"},
    {q:"ما هو أصغر قارة؟",o:["أوروبا","أنتاركتيكا","أستراليا","أمريكا الجنوبية"],a:2,d:"medium"},
    {q:"عاصمة كازاخستان؟",o:["ألماتي","أستانا","شيمكنت","كاراغاندا"],a:1,d:"hard"},
    {q:"ما هو أصغر دولة في العالم؟",o:["موناكو","سان مارينو","الفاتيكان","ليختنشتاين"],a:2,d:"hard"},
    {q:"أين يقع بحر آرال؟",o:["أوزبكستان وكازاخستان","روسيا وأوكرانيا","إيران والعراق","تركمانستان وأفغانستان"],a:0,d:"hard"},
    {q:"ما عاصمة بوتان؟",o:["كاتماندو","تيمفو","دكا","كولومبو"],a:1,d:"hard"},
  ],
  history:[
    {q:"متى قامت الثورة الفرنسية؟",o:["1776","1789","1812","1848"],a:1,d:"easy"},
    {q:"من بنى الأهرامات؟",o:["الرومان","المصريون القدماء","الإغريق","الفينيقيون"],a:1,d:"easy"},
    {q:"أول رئيس أمريكي؟",o:["جيفرسون","آدامز","واشنطن","فرانكلين"],a:2,d:"easy"},
    {q:"متى انتهت الحرب العالمية الثانية؟",o:["1943","1944","1945","1946"],a:2,d:"easy"},
    {q:"من اخترع الطباعة؟",o:["جوتنبرج","نيوتن","داڤنشي","فرانكلين"],a:0,d:"easy"},
    {q:"في أي قرن فتح المسلمون الأندلس؟",o:["السادس","السابع","الثامن","التاسع"],a:2,d:"easy"},
    {q:"متى بدأت الحرب العالمية الأولى؟",o:["1910","1912","1914","1916"],a:2,d:"easy"},
    {q:"من كان نابليون بونابرت؟",o:["ملك فرنسا","إمبراطور فرنسا","رئيس فرنسا","قائد عسكري بريطاني"],a:1,d:"easy"},
    {q:"متى سقط جدار برلين؟",o:["1985","1987","1989","1991"],a:2,d:"medium"},
    {q:"أكبر إمبراطورية في التاريخ مساحة؟",o:["الرومانية","الإسلامية","البريطانية","المغولية"],a:2,d:"medium"},
    {q:"متى انتهت الحرب الباردة؟",o:["1985","1989","1991","1993"],a:2,d:"medium"},
    {q:"من كان أول من يحيط بالكرة الأرضية؟",o:["كولومبوس","ماجلان","ڤاسكو دي غاما","كوك"],a:1,d:"medium"},
    {q:"في أي عام اكتشف كولومبوس أمريكا؟",o:["1488","1492","1498","1502"],a:1,d:"medium"},
    {q:"من كان آخر فراعنة مصر؟",o:["رمسيس الثاني","توت عنخ آمون","كليوباترا","نفرتيتي"],a:2,d:"hard"},

const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function getACtx(){if(!actx)actx=new AudioCtx();return actx;}
function playSound(t){
  try{
    const c=getACtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    if(t==='correct'){
      o.frequency.setValueAtTime(520,c.currentTime);
      o.frequency.setValueAtTime(660,c.currentTime+0.1);
      o.frequency.setValueAtTime(800,c.currentTime+0.2);
      g.gain.setValueAtTime(0.3,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);
      o.start(c.currentTime);o.stop(c.currentTime+0.4);
    }else if(t==='wrong'){
      o.frequency.setValueAtTime(300,c.currentTime);
      o.frequency.setValueAtTime(200,c.currentTime+0.15);
      g.gain.setValueAtTime(0.3,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.35);
      o.start(c.currentTime);o.stop(c.currentTime+0.35);
    }else if(t==='tick'){
      o.frequency.value=880;
      g.gain.setValueAtTime(0.08,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.05);
      o.start(c.currentTime);o.stop(c.currentTime+0.05);
    }else if(t==='powerup'){
      o.frequency.setValueAtTime(440,c.currentTime);
      o.frequency.setValueAtTime(880,c.currentTime+0.1);
      g.gain.setValueAtTime(0.2,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);
      o.start(c.currentTime);o.stop(c.currentTime+0.25);
    }else if(t==='win'){
      [523,659,784,1047].forEach((f,i)=>{
        const o2=c.createOscillator(),g2=c.createGain();
        o2.connect(g2);g2.connect(c.destination);
        o2.frequency.value=f;
        g2.gain.setValueAtTime(0.2,c.currentTime+i*0.13);
        g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.13+0.2);
        o2.start(c.currentTime+i*0.13);o2.stop(c.currentTime+i*0.13+0.25);
      });
    }
  }catch(e){}
}

  gameMode=m;
  document.getElementById('tab-normal').classList.toggle('active',m==='normal');
  document.getElementById('tab-speed').classList.toggle('active',m==='speed');
}
function buildQuestions(){
  const total=players.length*questionCount;
  let pool=[];
  selectedTopics.forEach(tid=>{
    (QB[tid]||[]).forEach((q,i)=>pool.push({...q,topic:tid,uid:tid+i}));
  });
  let fresh=pool.filter(q=>!usedQ.includes(q.uid));
  if(fresh.length<total){usedQ=[];fresh=pool;}
  const easy=fresh.filter(q=>q.d==='easy').sort(()=>Math.random()-0.5);
  const med=fresh.filter(q=>q.d==='medium').sort(()=>Math.random()-0.5);
  const hard=fresh.filter(q=>q.d==='hard').sort(()=>Math.random()-0.5);
  const eC=Math.ceil(total*0.5),mC=Math.ceil(total*0.35),hC=Math.max(0,total-eC-mC);
  const sel=[...easy.slice(0,eC),...med.slice(0,mC),...hard.slice(0,hC)].slice(0,total);
  sel.sort(()=>Math.random()-0.5);
  sel.forEach(q=>{if(!usedQ.includes(q.uid))usedQ.push(q.uid);});
  sessionStorage.setItem('mc_used3',JSON.stringify(usedQ));
  return sel;
}
function startGame(){
  questions=buildQuestions();
  scores={};powerups={};playerStats={};
  players.forEach(p=>{
    scores[p]=0;
    powerups[p]={eliminate:true,double:true,skip:true,time:true};
    playerStats[p]={correct:0,wrong:0,total:0};
  });
  currentQ=0;currentPlayerIdx=0;
  goTo('game');
  renderQuestion();
}
function getDiff(d){
  if(d==='easy')return{label:'سهل',cls:'diff-easy'};
  if(d==='medium')return{label:'متوسط',cls:'diff-medium'};
  return{label:'صعب',cls:'diff-hard'};
}
function renderQuestion(){
  if(currentQ>=questions.length){showResults();return;}
  const q=questions[currentQ];
  const player=players[currentPlayerIdx];
  const pColor=playerColors[player]?.bg||'#6366F1';
  answered=false;doubled=false;
  const tLimit=gameMode==='speed'?5:15;
  const av=document.getElementById('player-avatar-display');
  av.style.background=pColor;av.textContent=player[0].toUpperCase();
  document.getElementById('current-score').textContent=scores[player]||0;
  const topic=TOPICS.find(t=>t.id===q.topic);
  document.getElementById('topic-badge').textContent=(topic?.emoji||'')+' '+(topic?.label||'');
  const dif=getDiff(q.d||'easy');
  const db=document.getElementById('diff-badge');
  db.textContent=dif.label;db.className='diff-badge '+dif.cls;
  document.getElementById('q-counter').textContent=(currentQ+1)+' / '+questions.length;
  document.getElementById('progress-fill').style.width=((currentQ/questions.length)*100)+'%';
  document.getElementById('current-player-badge').textContent=player;
  document.getElementById('current-player-badge').style.background=pColor;
  document.getElementById('double-banner').style.display='none';
  document.getElementById('question-text').textContent=q.q;
  document.getElementById('btn-next').style.display='none';
  document.getElementById('options-container').innerHTML=(q.o||[]).map((opt,i)=>`
    <button class="option-btn" id="opt-${i}" onclick="handleAnswer(${i})">
      <span style="width:28px;height:28px;border-radius:50%;background:#6366F122;color:#818CF8;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0">${['A','B','C','D'][i]}</span>${opt}
    </button>`).join('');
  document.getElementById('powerups-container').innerHTML=POWERUPS_DEF.map(pu=>`
    <button class="powerup-btn" id="pu-${pu.id}"
      style="border-color:${powerups[player][pu.id]?pu.color:'transparent'};color:${pu.color};background:${powerups[player][pu.id]?pu.color+'22':'var(--border)'}"
      ${!powerups[player][pu.id]||gameMode==='speed'?'disabled':''}
      onclick="usePowerup('${pu.id}')" title="${pu.label}">${pu.icon}</button>`).join('');
  startTimer(tLimit);
}
function startTimer(limit){
  clearInterval(timerInterval);timerVal=limit;updateTimer();
  timerInterval=setInterval(()=>{
    timerVal--;
    if(timerVal<=5)playSound('tick');
    updateTimer();
    if(timerVal<=0){clearInterval(timerInterval);if(!answered)handleAnswer(-1);}
  },1000);
}
function updateTimer(){
  document.getElementById('timer-num').textContent=timerVal;
  document.getElementById('timer-box').classList.toggle('danger',timerVal<=5);
}
function handleAnswer(idx){
  if(answered)return;
  answered=true;clearInterval(timerInterval);
  const q=questions[currentQ];
  const player=players[currentPlayerIdx];
  playerStats[player].total++;
  const isCorrect=idx===q.a;
  if(isCorrect){playSound('correct');playerStats[player].correct++;}
  else if(idx!==-1){playSound('wrong');playerStats[player].wrong++;}
  for(let i=0;i<(q.o||[]).length;i++){
    const btn=document.getElementById('opt-'+i);
    if(!btn)continue;
    btn.disabled=true;
    if(i===q.a)btn.classList.add('correct');
    else if(i===idx)btn.classList.add('wrong');
    const span=btn.querySelector('span');
    if(span){
      if(i===q.a){span.style.background='#10B981';span.style.color='#fff';span.textContent='✓';}
      else if(i===idx){span.style.background='#EF4444';span.style.color='#fff';span.textContent='✕';}
    }
  }
  if(isCorrect){
    const pts=doubled?20:10;
    scores[player]=(scores[player]||0)+pts;
    document.getElementById('current-score').textContent=scores[player];
    const sc=document.getElementById('current-score');
    sc.classList.add('pulse');setTimeout(()=>sc.classList.remove('pulse'),300);
  }
  document.getElementById('btn-next').style.display='block';
  document.getElementById('btn-next').textContent=currentQ+1>=questions.length?'🏆 النتائج':'السؤال التالي →';
}
function nextQuestion(){
  currentQ++;currentPlayerIdx=(currentPlayerIdx+1)%players.length;renderQuestion();
}
function usePowerup(type){
  if(answered||gameMode==='speed')return;
  const player=players[currentPlayerIdx];
  if(!powerups[player][type])return;
  powerups[player][type]=false;playSound('powerup');
  const btn=document.getElementById('pu-'+type);
  if(btn){btn.disabled=true;btn.style.opacity='0.25';}
  if(type==='eliminate'){
    const q=questions[currentQ];
    [0,1,2,3].filter(i=>i!==q.a).sort(()=>Math.random()-0.5).slice(0,2).forEach(i=>{
      const b=document.getElementById('opt-'+i);if(b){b.classList.add('eliminated');b.disabled=true;}
    });
  }else if(type==='double'){doubled=true;document.getElementById('double-banner').style.display='block';}
  else if(type==='skip'){answered=true;clearInterval(timerInterval);nextQuestion();}
  else if(type==='time'){timerVal+=15;updateTimer();}
}
function showResults(){
  playSound('win');
  const sorted=[...players].sort((a,b)=>(scores[b]||0)-(scores[a]||0));
  sorted.forEach(p=>{
    leaderboard.push({name:p,color:playerColors[p]?.bg||'#6366F1',letter:p[0].toUpperCase(),score:scores[p]||0,date:new Date().toLocaleDateString('ar')});
  });
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard=leaderboard.slice(0,20);
  localStorage.setItem('mc_lb3',JSON.stringify(leaderboard));
  goTo('results');
  const medals=['🥇','🥈','🥉'];
  document.getElementById('results-list').innerHTML=sorted.map((p,i)=>`
    <div class="result-row ${i===0?'first':''}">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:26px">${medals[i]||'#'+(i+1)}</span>
        <div style="width:36px;height:36px;border-radius:50%;background:${playerColors[p]?.bg||'#6366F1'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px">${p[0].toUpperCase()}</div>
        <span style="font-weight:800;font-size:17px">${p}</span>
      </div>
      <span class="score-badge ${i===0?'gold':''}">${scores[p]||0} ⭐</span>
    </div>`).join('');
  document.getElementById('stats-section').innerHTML='<h3 style="font-size:16px;font-weight:800;margin-bottom:10px;color:var(--subtext)">📊 الإحصائيات</h3>'+
    sorted.map(p=>{
      const st=playerStats[p]||{correct:0,total:0};
      const pct=st.total>0?Math.round((st.correct/st.total)*100):0;
      return `<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:28px;height:28px;border-radius:50%;background:${playerColors[p]?.bg||'#6366F1'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:12px">${p[0].toUpperCase()}</div>
            <span style="font-weight:700">${p}</span>
          </div>
          <span style="color:var(--subtext);font-size:13px">${st.correct}/${st.total} صحيح</span>
        </div>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
        <div style="text-align:left;font-size:12px;color:var(--subtext);margin-top:4px">${pct}%</div>
      </div>`;
    }).join('');
}
function renderLeaderboard(){
  if(!leaderboard.length){
    document.getElementById('leaderboard-list').innerHTML='<div style="text-align:center;padding:40px;color:var(--subtext)">لا يوجد سجلات بعد 🏆</div>';return;
  }
  document.getElementById('leaderboard-list').innerHTML=leaderboard.slice(0,10).map((e,i)=>`
    <div class="leaderboard-row">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-weight:900;color:var(--subtext);width:20px">${i+1}</span>
        <div style="width:34px;height:34px;border-radius:50%;background:${e.color};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:14px">${e.letter}</div>
        <div><div style="font-weight:700">${e.name}</div><div style="font-size:11px;color:var(--subtext)">${e.date}</div></div>
      </div>
      <span class="score-badge" style="font-size:14px;padding:3px 12px">${e.score} ⭐</span>
    </div>`).join('');
}
function clearLeaderboard(){leaderboard=[];localStorage.setItem('mc_lb3','[]');renderLeaderboard();}
function resetGame(){
  players=[];playerColors={};selectedTopics=[];questionCount=3;questions=[];
  currentQ=0;currentPlayerIdx=0;scores={};powerups={};
  document.getElementById('players-list').innerHTML='';
  document.getElementById('player-count').textContent='0/8';
  document.getElementById('players-hint').style.display='block';
  document.getElementById('btn-to-topics').disabled=true;
  goTo('home');
}
renderTopics();
</script>
